version: '3.9'

services:
  web:
    build: ./php
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: robotics
      MYSQL_USER: syafiq
      MYSQL_PASSWORD: syafiq123
    ports:
      - "3307:3306"